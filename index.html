<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Chat AI</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; }
        #chat-log { height: 400px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        #user-input { width: 80%; padding: 10px; }
        #send-btn { padding: 10px; cursor: pointer; }
        #status { font-size: 0.8em; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Local Chat AI</h1>
    <div id="status">Starting engine...</div>
    <div id="chat-log"></div>
    <input type="text" id="user-input" placeholder="Type a message..." />
    <button id="send-btn" disabled>Send</button>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
